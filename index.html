  <style>
    :root{--ink:#050505;--paper:#fff}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--paper);font-family:Inter,Arial,Helvetica,sans-serif;color:var(--ink)}body{display:grid;place-items:center;min-height:100svh;padding:2.78vw}.canvas{position:relative;width:min(94.44vw,1360px);aspect-ratio:1360/944;border:1px solid var(--ink);overflow:hidden;background:#fff}.brand,.suffix,.eyebrow,.hero,.cta,.footer{position:absolute;margin:0}.brand{left:3.46%;top:3.25%;font-size:clamp(16px,1.95vw,28px);font-weight:700;letter-spacing:-.02em}.suffix{right:4.12%;top:3.7%;font-size:clamp(14px,1.53vw,22px);font-weight:500}.header-rule{position:absolute;left:3.46%;right:3.46%;top:10.28%;height:1px;background:var(--ink)}.eyebrow{left:3.82%;top:16.95%;font-size:clamp(9px,.97vw,14px);font-weight:600;letter-spacing:.12em;color:#6b6b6b}.hero{left:3.46%;top:21.6%;font-size:clamp(54px,8.06vw,116px);line-height:.92;letter-spacing:-.05em;font-weight:800}.divider{position:absolute;left:43.68%;top:17.16%;width:1.5px;height:59.75%;background:var(--ink)}.cta{left:3.82%;top:63.77%;height:6.57%;display:flex;align-items:stretch}.cta a{width:230px;border:2px solid var(--ink);display:grid;place-items:center;color:inherit;text-decoration:none;font-size:15px;font-weight:650;letter-spacing:.1em;transition:.25s}.cta a:hover,.cta a:focus-visible{background:var(--ink);color:#fff}.cta-icon{width:62px;margin-left:24px;background:var(--ink);display:grid;place-items:center}.tri-white{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:12px solid #fff}.rhythm-line{position:absolute;left:6.54%;top:76.9%;width:37.2%;height:1.5px;background:var(--ink)}.rhythm{position:absolute;left:3.82%;top:81.14%;display:flex;gap:20px}.rhythm i{display:block;width:22px;height:22px;border:1.25px solid var(--ink)}.rhythm i:nth-child(odd){background:var(--ink);animation:blink 2.8s steps(1) infinite}.shape{position:absolute}.outline-main{left:40%;top:13.56%;width:25.74%;aspect-ratio:1;border:2.5px solid}.black-main{left:52.35%;top:32.84%;width:18.53%;aspect-ratio:1;background:var(--ink);animation:drift 6s ease-in-out infinite}.triangle-main{left:34.85%;top:23.6%;width:0;height:0;border-left:65px solid transparent;border-right:65px solid transparent;border-bottom:113px solid var(--ink)}.triangle-main:after{content:"";position:absolute;left:-14px;top:31px;border-left:14px solid transparent;border-right:14px solid transparent;border-top:24px solid white}.outline-small{left:62.35%;top:15.47%;width:4.85%;aspect-ratio:1;border:1.75px solid}.solid-small{left:50.59%;top:64.2%;width:6.03%;aspect-ratio:1;background:var(--ink)}.side-triangle{left:27.94%;top:65.5%;border-top:14px solid transparent;border-bottom:14px solid transparent;border-left:23px solid var(--ink)}.arrow-cluster{left:43.6%;top:47.8%;width:15.5%;height:16%}.arrow-cluster:before{content:"";position:absolute;left:0;top:25%;width:44%;height:31%;background:var(--ink)}.arrow-cluster:after{content:"";position:absolute;left:30%;top:0;border-top:38px solid transparent;border-bottom:38px solid transparent;border-right:62px solid var(--ink)}.arrow-square{position:absolute;right:0;bottom:0;width:43%;aspect-ratio:1;background:var(--ink)}.outline-low{left:75.29%;top:72.46%;width:12.2%;aspect-ratio:1;border:1.75px solid}.black-low{left:82.5%;top:80.93%;width:7.94%;aspect-ratio:1;background:var(--ink)}.front-low{left:66%;top:68.3%;width:6.18%;aspect-ratio:1;background:var(--ink)}.micro-mark{right:3.46%;top:33.9%;width:16px;height:11.86%;background:var(--ink)}.micro-square{left:40%;top:72.88%;width:6.25%;aspect-ratio:1;border:1.5px solid}.footer{left:0;right:0;bottom:0;height:6.36%;background:var(--ink);color:#fff;display:flex;align-items:center;padding-left:3.46%;font-size:clamp(8px,1.04vw,15px);letter-spacing:.1em}.footer-squares{position:absolute;left:58%;bottom:.55%;display:flex;gap:22px}.footer-squares i{display:block;width:36px;height:36px;background:#fff;animation:pulse 2.4s ease-in-out infinite}.footer-squares i:nth-child(3){margin-left:36px}.footer-squares i:nth-child(even){animation-delay:.3s}@keyframes drift{50%{transform:translate(-10px,8px)}}@keyframes blink{50%{background:#fff}}@keyframes pulse{50%{transform:translateY(-5px)}}@media(max-width:760px){body{padding:14px}.canvas{width:100%;min-height:calc(100svh - 28px);aspect-ratio:auto}.hero{font-size:13vw;top:22%}.divider{display:none}.outline-main{left:58%;top:43%;width:33%}.black-main{left:68%;top:50%;width:25%}.triangle-main{left:46%;top:45%;transform:scale(.72)}.cta{top:auto;bottom:22%;transform:scale(.75);transform-origin:left}.rhythm-line{top:auto;bottom:16%;width:70%}.rhythm{top:auto;bottom:11%;gap:10px}.rhythm i{width:14px;height:14px}.outline-small,.solid-small,.side-triangle,.arrow-cluster,.outline-low,.black-low,.front-low,.micro-square{display:none}.footer-squares{right:4%;left:auto}.footer-squares i{width:20px;height:20px}.footer-squares i:nth-child(3){margin-left:10px}}
