name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify animations run once
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f CNAME
          grep -Eq '@keyframes' index.html
          grep -Eq 'prefers-reduced-motion' index.html
          if grep -Eiq 'infinite|animation-iteration-count[[:space:]]*:[[:space:]]*([2-9]|[1-9][0-9]+)' index.html; then
            echo "A repeating animation was found in index.html."
            exit 1
          fi

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir _site
          cp index.html CNAME .nojekyll favicon.jpg _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
